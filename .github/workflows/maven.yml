# File: .github/workflows/maven.yml

name: Daily API BDD TESTS

on:
  schedule:
    # Runs at 3:30 AM UTC, which is 9:00 AM IST
    # Monday to Friday
    - cron: '30 3 * * 1-5'
  
  # Allow manual trigger from Actions tab
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
      
      - name: Build with Maven (Download Dependencies)
        run: mvn clean install -DskipTests

      - name: Create Maven settings security file
        run: |
          mkdir -p ~/.m2
          echo '<settingsSecurity><master>ignored</master></settingsSecurity>' > ~/.m2/settings-security.xml
      
      - name: Run Cucumber Filter Feature Tests
        # Pass environment variables from GitHub Secrets
        env:
          BASE_URI: ${{ secrets.BASE_URI }}
          LOGIN_ENDPOINT: ${{ secrets.LOGIN_ENDPOINT }}
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
          REPORT_PATH: ${{ secrets.REPORT_PATH }}
        run: |
          echo "🚀 Starting API BDD Tests with environment variables..."
          mvn test -DCucumber.tags="@FilterFeature" -X
      
      - name: Upload test results (Always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-test-reports
          path: TestReports/
          retention-days: 30
      
      - name: Publish Test Report Summary
        if: always()
        run: |
          echo "✅ Test execution completed"
          echo "📊 Reports available in artifacts"
